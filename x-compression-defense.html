<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X投稿専用：画質絶対防衛エンコーダー</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0b;
            --panel-bg: rgba(22, 22, 22, 0.8);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f5;
            --text-secondary: #a3a3a3;
            --accent-color: #e5e5e5;
            --accent-hover: #ffffff;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Layout */
        .main-viewport {
            flex-grow: 1;
            display: flex;
            position: relative;
            background: #121212;
            height: 100%;
        }

        .sidebar {
            width: 380px;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            z-index: 10;
            flex-shrink: 0;
            height: 100%;
        }

        .viewport-pane {
            flex: 1;
            position: relative;
            overflow: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .viewport-pane:first-child {
            border-right: 1px solid rgba(255, 255, 255, 0.15);
        }

        .viewport-header {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--panel-border);
            z-index: 5;
            font-size: 0.8rem;
            font-weight: 500;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .viewport-title {
            font-weight: 600;
            color: var(--text-primary);
        }

        .viewport-sub {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .viewport-canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: grab;
        }

        .viewport-canvas-container:active {
            cursor: grabbing;
        }

        .render-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            display: none;
            image-rendering: pixelated;
        }

        /* Sidebar Elements */
        h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 5px;
        }

        .dropzone {
            border: 2px dashed var(--panel-border);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
        }

        .dropzone p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .dropzone .icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 500;
        }

        select, input[type="range"] {
            accent-color: var(--accent-color);
        }

        select {
            background: #262626;
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            outline: none;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #404040;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-download {
            background: var(--accent-color);
            color: #111111;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
            display: none;
        }

        .btn-download:hover {
            background: var(--accent-hover);
        }

        /* Stats Table */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 6px;
            overflow: hidden;
        }

        .stats-table th, .stats-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--panel-border);
        }

        .stats-table th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stats-table tr:last-child td {
            border-bottom: none;
        }

        .banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger-color);
            border-radius: 6px;
            padding: 10px;
            font-size: 0.75rem;
            color: #fca5a5;
            display: none;
        }

        .placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            pointer-events: none;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .placeholder-text svg {
            width: 44px;
            height: 44px;
            stroke: var(--text-secondary);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <!-- Left side image views -->
    <main class="main-viewport">
        <div class="placeholder-text" id="viewportPlaceholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <p>画像をアップロードして最適化を開始してください</p>
        </div>

        <!-- Left Pane (Optimized output) -->
        <div class="viewport-pane" id="paneLeft">
            <div class="viewport-header">
                <span class="viewport-title">最適化済み（圧縮回避適用）</span>
                <span class="viewport-sub" id="headerSubLeft">-</span>
            </div>
            <div class="viewport-canvas-container" id="containerLeft">
                <canvas class="render-canvas" id="canvasLeft"></canvas>
            </div>
        </div>

        <!-- Right Pane (X Low Quality Emulation) -->
        <div class="viewport-pane" id="paneRight">
            <div class="viewport-header">
                <span class="viewport-title">X投稿後の劣化シミュレーション</span>
                <span class="viewport-sub" id="headerSubRight">-</span>
            </div>
            <div class="viewport-canvas-container" id="containerRight">
                <canvas class="render-canvas" id="canvasRight"></canvas>
            </div>
        </div>
    </main>

    <!-- Right side sidebar panels -->
    <aside class="sidebar">
        <div>
            <h1>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m10 8 6 4-6 4V8z"/></svg>
                X絶対防衛エンコーダー
            </h1>
            <div class="subtitle">X Image Quality Absolute Defense Encoder</div>
        </div>

        <div id="errorBanner" class="banner"></div>

        <!-- 1. Input Image -->
        <section>
            <div class="section-title">1. 画像の選択</div>
            <div class="dropzone" id="dropzone">
                <div class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <p>ドラッグ＆ドロップまたは選択</p>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
        </section>

        <!-- 2. Optimization Settings -->
        <section>
            <div class="section-title">2. 最適化・エンコード設定</div>
            <div class="control-group">
                <div class="control-row">
                    <label for="modeSelect">最適化モード</label>
                    <select id="modeSelect">
                        <option value="photo" selected>写真（JPEG優先）</option>
                        <option value="illustration">イラスト（PNG優先）</option>
                    </select>
                </div>

                <!-- PNG Mode Specific options -->
                <div id="pngOptions" style="display: none; flex-direction: column; gap: 10px;">
                    <div class="control-row">
                        <label for="pngConstraintToggle">長辺900px以下にリサイズしてPNGを維持</label>
                        <label class="switch">
                            <input type="checkbox" id="pngConstraintToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <!-- Dither Denoising / Grad protection noise -->
                <div class="slider-container">
                    <div class="slider-header">
                        <label for="rangeDither">階調保護ノイズ強度</label>
                        <span id="txtDither">1x</span>
                    </div>
                    <input type="range" id="rangeDither" min="0" max="10" value="2">
                </div>
            </div>
        </section>

        <!-- 3. Size Comparison Table -->
        <section>
            <div class="section-title">3. サイズ・圧縮率テーブル</div>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>状態</th>
                        <th>サイズ / 比率</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>メモリ展開時 (RGBA 32bit)</td>
                        <td id="sizeRaw">-</td>
                    </tr>
                    <tr>
                        <td>元ファイル</td>
                        <td id="sizeOriginal">-</td>
                    </tr>
                    <tr>
                        <td>最適化後（Xアップロード容量）</td>
                        <td id="sizeOptimized">-</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <!-- 4. Export button -->
        <a id="btnDownload" class="btn-download" download="x_optimized.jpg">最適化画像のダウンロード</a>
    </aside>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const modeSelect = document.getElementById('modeSelect');
        const pngOptions = document.getElementById('pngOptions');
        const pngConstraintToggle = document.getElementById('pngConstraintToggle');
        const rangeDither = document.getElementById('rangeDither');
        const txtDither = document.getElementById('txtDither');
        const btnDownload = document.getElementById('btnDownload');
        const errorBanner = document.getElementById('errorBanner');
        const viewportPlaceholder = document.getElementById('viewportPlaceholder');

        const canvasLeft = document.getElementById('canvasLeft');
        const canvasRight = document.getElementById('canvasRight');
        const containerLeft = document.getElementById('containerLeft');
        const containerRight = document.getElementById('containerRight');

        const sizeRaw = document.getElementById('sizeRaw');
        const sizeOriginal = document.getElementById('sizeOriginal');
        const sizeOptimized = document.getElementById('sizeOptimized');
        const headerSubLeft = document.getElementById('headerSubLeft');
        const headerSubRight = document.getElementById('headerSubRight');

        const state = {
            originalFile: null,
            image: null,
            panX: 0,
            panY: 0,
            scale: 1,
            isDragging: false,
            startX: 0,
            startY: 0,
            optimizedBlob: null,
            optimizedUrl: null,
            emulatedUrl: null
        };

        // Event Listeners
        dropzone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });

        modeSelect.addEventListener('change', () => {
            pngOptions.style.display = modeSelect.value === 'illustration' ? 'flex' : 'none';
            processImage();
        });
        pngConstraintToggle.addEventListener('change', processImage);
        rangeDither.addEventListener('input', (e) => {
            txtDither.textContent = e.target.value === '0' ? '無効' : e.target.value + 'x';
            processImage();
        });

        // Initialize synchronized viewport pan/zoom
        setupViewportSync();

        function showError(msg) {
            errorBanner.textContent = msg;
            errorBanner.style.display = msg ? 'block' : 'none';
        }

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showError('有効な画像ファイルを選択してください。');
                return;
            }
            showError('');
            state.originalFile = file;

            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                state.image = img;
                resetZoomAndPan();
                processImage();
                viewportPlaceholder.style.display = 'none';
                canvasLeft.style.display = 'block';
                canvasRight.style.display = 'block';
                URL.revokeObjectURL(url);
            };
            img.onerror = () => {
                showError('画像の読み込みに失敗しました。');
                URL.revokeObjectURL(url);
            };
            img.src = url;
        }

        function resetZoomAndPan() {
            if (!state.image) return;
            const containerW = containerLeft.clientWidth;
            const containerH = containerLeft.clientHeight;
            const imgW = state.image.width;
            const imgH = state.image.height;

            const scaleX = containerW / imgW;
            const scaleY = containerH / imgH;
            state.scale = Math.min(scaleX, scaleY, 1.0) * 0.9;
            state.panX = 0;
            state.panY = 0;
            applyTransforms();
        }

        function formatBytes(bytes) {
            if (!bytes) return '-';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Apply gradation protection noise to flat areas
        function applyGradationProtection(ctx, w, h, noiseIntensity) {
            if (noiseIntensity === 0) return;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            // Simple variance/flat area edge checks
            const threshold = 12;
            for (let y = 1; y < h - 1; y += 2) {
                for (let x = 1; x < w - 1; x += 2) {
                    const idx = (y * w + x) * 4;

                    // Neighbors
                    const rightIdx = idx + 4;
                    const bottomIdx = idx + (w * 4);

                    const rDiff = Math.abs(data[idx] - data[rightIdx]) + Math.abs(data[idx] - data[bottomIdx]);
                    const gDiff = Math.abs(data[idx+1] - data[rightIdx+1]) + Math.abs(data[idx+1] - data[bottomIdx+1]);
                    const bDiff = Math.abs(data[idx+2] - data[rightIdx+2]) + Math.abs(data[idx+2] - data[bottomIdx+2]);

                    // If differences are low, it is a flat area
                    if (rDiff < threshold && gDiff < threshold && bDiff < threshold) {
                        // Apply micro random noise to 4 pixel block with saturation correction
                        const blockIndices = [
                            idx,
                            idx + 4,
                            idx + (w * 4),
                            idx + (w * 4) + 4
                        ];

                        blockIndices.forEach(pIdx => {
                            if (pIdx < data.length) {
                                const noise = (Math.random() - 0.5) * noiseIntensity * 2;
                                let r = data[pIdx] + noise;
                                let g = data[pIdx+1] + noise;
                                let b = data[pIdx+2] + noise;

                                // Saturation compensation: Y + S * (C - Y)
                                const y = 0.299 * r + 0.587 * g + 0.114 * b;
                                const satBoost = 1.0 + (noiseIntensity * 0.004); 

                                data[pIdx]   = Math.max(0, Math.min(255, y + satBoost * (r - y)));
                                data[pIdx+1] = Math.max(0, Math.min(255, y + satBoost * (g - y)));
                                data[pIdx+2] = Math.max(0, Math.min(255, y + satBoost * (b - y)));
                            }
                        });
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        async function processImage() {
            if (!state.image) return;

            // Clean up old URLs
            if (state.optimizedUrl) URL.revokeObjectURL(state.optimizedUrl);
            if (state.emulatedUrl) URL.revokeObjectURL(state.emulatedUrl);

            const isPhoto = modeSelect.value === 'photo';
            const originalW = state.image.width;
            const originalH = state.image.height;
            const longEdge = Math.max(originalW, originalH);

            let targetW = originalW;
            let targetH = originalH;
            let outputFormat = 'image/jpeg';

            // Determine dimensions and formats based on X requirements
            if (isPhoto) {
                if (longEdge > 4096) {
                    const ratio = 4096 / longEdge;
                    targetW = Math.round(originalW * ratio);
                    targetH = Math.round(originalH * ratio);
                }
            } else {
                const limitPNG = pngConstraintToggle.checked;
                if (longEdge > 900) {
                    if (limitPNG) {
                        const ratio = 900 / longEdge;
                        targetW = Math.round(originalW * ratio);
                        targetH = Math.round(originalH * ratio);
                        outputFormat = 'image/png';
                    } else {
                        // Fallback to Photo JPEG Mode
                        if (longEdge > 4096) {
                            const ratio = 4096 / longEdge;
                            targetW = Math.round(originalW * ratio);
                            targetH = Math.round(originalH * ratio);
                        }
                        outputFormat = 'image/jpeg';
                    }
                } else {
                    outputFormat = 'image/png';
                }
            }

            // Create Canvas & redraw image to wipe EXIF metadata completely
            const canvas = document.createElement('canvas');
            canvas.width = targetW;
            canvas.height = targetH;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(state.image, 0, 0, targetW, targetH);

            // Apply gradation protection noise
            const noiseIntensity = parseInt(rangeDither.value);
            applyGradationProtection(ctx, targetW, targetH, noiseIntensity);

            // Output targets
            let finalBlob = null;
            if (outputFormat === 'image/png') {
                finalBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            } else {
                // Photo mode JPEG size tuning (Target size: <= 5MB)
                const targetLimit = 5 * 1024 * 1024; // 5MB
                let low = 0.90;
                let high = 0.97;
                let bestQuality = 0.97;
                let bestBlob = null;

                // Simple iterative search loop to hit the quality sweetspot <= 5MB
                for (let i = 0; i < 4; i++) {
                    const mid = (low + high) / 2;
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', mid));
                    if (blob.size <= targetLimit) {
                        bestQuality = mid;
                        bestBlob = blob;
                        low = mid; // Try higher quality
                    } else {
                        high = mid; // Must use lower quality
                    }
                }

                if (!bestBlob) {
                    bestBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.90));
                }
                finalBlob = bestBlob;
            }

            state.optimizedBlob = finalBlob;
            state.optimizedUrl = URL.createObjectURL(finalBlob);

            // Populate Sizes in comparison Table
            const rawBytes = targetW * targetH * 4;
            const pct = (finalBlob.size / rawBytes * 100).toFixed(2);
            sizeRaw.textContent = formatBytes(rawBytes);
            sizeOriginal.textContent = formatBytes(state.originalFile.size);
            sizeOptimized.textContent = `${formatBytes(finalBlob.size)} (${pct}%)`;

            // Draw to Left Viewport (Optimized Output)
            const imgLeft = new Image();
            imgLeft.onload = () => {
                canvasLeft.width = targetW;
                canvasLeft.height = targetH;
                canvasLeft.getContext('2d').drawImage(imgLeft, 0, 0);
                headerSubLeft.textContent = `${outputFormat.split('/')[1].toUpperCase()} | ${targetW}x${targetH} | ${formatBytes(finalBlob.size)}`;
            };
            imgLeft.src = state.optimizedUrl;

            // X low quality degradation emulation (compress to low quality JPEG)
            const emuCanvas = document.createElement('canvas');
            emuCanvas.width = targetW;
            emuCanvas.height = targetH;
            const emuCtx = emuCanvas.getContext('2d');
            emuCtx.drawImage(canvas, 0, 0);

            // Emulate X low quality resizing + compression (Quality 85%, 4:2:0 subsampling emulated via quality 0.35)
            const emuBlob = await new Promise(resolve => emuCanvas.toBlob(resolve, 'image/jpeg', 0.35));
            state.emulatedUrl = URL.createObjectURL(emuBlob);

            // Draw to Right Viewport (X Low Quality Emulation)
            const imgRight = new Image();
            imgRight.onload = () => {
                canvasRight.width = targetW;
                canvasRight.height = targetH;
                canvasRight.getContext('2d').drawImage(imgRight, 0, 0);
                headerSubRight.textContent = `JPEG (シミュレーション) | ${targetW}x${targetH} | ${formatBytes(emuBlob.size)}`;
            };
            imgRight.src = state.emulatedUrl;

            // Configure download button
            btnDownload.href = state.optimizedUrl;
            btnDownload.download = outputFormat === 'image/png' ? 'x_optimized.png' : 'x_optimized.jpg';
            btnDownload.style.display = 'block';
        }

        function setupViewportSync() {
            const containers = [containerLeft, containerRight];

            containers.forEach((container) => {
                container.addEventListener('mousedown', (e) => {
                    if (!state.image) return;
                    state.isDragging = true;
                    state.startX = e.clientX - state.panX;
                    state.startY = e.clientY - state.panY;
                });

                container.addEventListener('mousemove', (e) => {
                    if (!state.isDragging) return;
                    state.panX = e.clientX - state.startX;
                    state.panY = e.clientY - state.startY;
                    applyTransforms();
                });

                container.addEventListener('wheel', (e) => {
                    if (!state.image) return;
                    e.preventDefault();

                    const zoomFactor = 1.1;
                    const oldScale = state.scale;
                    
                    if (e.deltaY < 0) {
                        state.scale = Math.min(state.scale * zoomFactor, 50);
                    } else {
                        state.scale = Math.max(state.scale / zoomFactor, 0.1);
                    }

                    const rect = container.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left - rect.width / 2;
                    const mouseY = e.clientY - rect.top - rect.height / 2;

                    state.panX = mouseX - (mouseX - state.panX) * (state.scale / oldScale);
                    state.panY = mouseY - (mouseY - state.panY) * (state.scale / oldScale);

                    applyTransforms();
                }, { passive: false });
            });

            window.addEventListener('mouseup', () => {
                state.isDragging = false;
            });

            window.addEventListener('resize', () => {
                if (state.image) applyTransforms();
            });
        }

        function applyTransforms() {
            const transStr = `translate(calc(-50% + ${state.panX}px), calc(-50% + ${state.panY}px)) scale(${state.scale})`;
            [canvasLeft, canvasRight].forEach(el => {
                if (el) el.style.transform = transStr;
            });
        }
    </script>
</body>
</html>
